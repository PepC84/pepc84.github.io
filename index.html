<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow: hidden;
}

/* Background lab image */
#lab {
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: url("files/lab.JPG") center/cover no-repeat;
}

/* Overlay (darken) */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* Header */
#header {
    position: fixed;
    top: 20px;
    right: 40px;
    display: flex;
    gap: 20px;
    align-items: center;
}

/* Resume button */
.resume {
    padding: 8px 16px;
    border: 1px solid white;
    cursor: pointer;
    transition: 0.2s;
}
.resume:hover {
    background: white;
    color: black;
}

/* Email */
.email {
    cursor: pointer;
    opacity: 0.8;
}
.email:hover {
    opacity: 1;
}

/* Title */
#title {
    position: fixed;
    bottom: 40px;
    left: 40px;
}

#title h1 {
    margin: 0;
    font-size: 40px;
}

#title p {
    margin: 5px 0 0;
    opacity: 0.7;
}

/* Click zones */
.zone {
    position: absolute;
    cursor: pointer;
}

/* Hover glow */
.zone:hover {
    outline: 2px solid rgba(255,255,255,0.5);
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.modal img, .modal video {
    max-width: 80%;
    max-height: 70%;
}

.close {
    position: absolute;
    top: 20px;
    right: 40px;
    font-size: 24px;
    cursor: pointer;
}

.button {
    margin-top: 20px;
    padding: 10px 20px;
    border: 1px solid white;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="lab"></div>
<div id="overlay"></div>

<!-- Header -->
<div id="header">
    <div class="email" onclick="location.href='mailto:j.llamas@berkeley.edu'">
        j.llamas@berkeley.edu
    </div>

    <div class="resume" onclick="window.open('files/Resume.pdf')">
        Resume
    </div>
</div>

<!-- Title -->
<div id="title">
    <h1>Jose Llamas</h1>
    <p>Sophomore @ UC Berkeley EECS</p>
</div>

<!-- Clickable zones -->

<!-- BLDC Motor -->
<div class="zone" style="top:40%; left:30%; width:200px; height:200px;"
     onclick="openModal('motor')"></div>

<!-- Violin -->
<div class="zone" style="top:50%; left:55%; width:200px; height:200px;"
     onclick="openModal('violin')"></div>

<!-- Oscilloscope -->
<div class="zone" style="top:30%; left:75%; width:200px; height:200px;"
     onclick="openModal('scope')"></div>


<!-- Motor Modal -->
<div class="modal" id="motor">
    <div class="close" onclick="closeModal()">✕</div>
    <img src="files/bldc_controller.JPG">
    <div class="button">BLDC Motor + Controller</div>
</div>

<!-- Violin Modal -->
<div class="modal" id="violin">
    <div class="close" onclick="closeModal()">✕</div>
    <img src="files/violin_top.JPG">
    <div class="button">Electric Violin Project</div>
</div>

<!-- Oscilloscope Modal -->
<div class="modal" id="scope">
    <div class="close" onclick="closeModal()">✕</div>
    <video src="files/oscilloscope.mp4" controls autoplay></video>
    <div class="button">Bad Apple on Oscilloscope</div>
</div>


<script>
function openModal(id) {
    document.getElementById(id).style.display = "flex";
}

function closeModal() {
    document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
}
</script>

</body>
</html>
