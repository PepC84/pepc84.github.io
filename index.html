<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* BACKGROUND LAB */
.lab {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('files/lab.jpg') center/cover no-repeat;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    z-index: 100;
}

.right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.terminal {
    color: #00ffff;
    font-family: monospace;
}

.resume-btn {
    padding: 6px 12px;
    border-radius: 6px;
    background: #00ffff;
    color: black;
    text-decoration: none;
}

/* HOTSPOTS */
.hotspot {
    position: absolute;
    width: 30px;
    height: 30px;
    background: #00ffff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 15px #00ffff;
    transition: 0.3s;
}

.hotspot:hover {
    transform: scale(1.3);
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: #111;
    padding: 20px;
    border-radius: 12px;
    display: none;
    z-index: 200;
    width: 80%;
    max-width: 600px;
}

.popup.show {
    display: block;
    transform: translate(-50%, -50%) scale(1);
}

.popup img, .popup video {
    width: 100%;
    border-radius: 10px;
}

.close {
    margin-top: 10px;
    cursor: pointer;
    color: #00ffff;
}

/* HERO TEXT */
.center-text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
}

.center-text h1 {
    font-size: 3rem;
}

.center-text p {
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="lab"></div>

<nav>
    <div></div>
    <div class="right">
        <div class="terminal">~/pepc84</div>
        <a href="files/Resume.pdf" class="resume-btn" target="_blank">Resume</a>
    </div>
</nav>

<div class="center-text">
    <h1>Jose Llamas</h1>
    <p>Sophomore @ UC Berkeley EECS</p>
</div>

<!-- HOTSPOTS (adjust positions later) -->

<div class="hotspot" style="top:60%; left:30%;" onclick="openPopup('motor')"></div>
<div class="hotspot" style="top:65%; left:50%;" onclick="openPopup('violin')"></div>
<div class="hotspot" style="top:55%; left:70%;" onclick="openPopup('scope')"></div>

<!-- POPUPS -->

<div id="motor" class="popup">
    <h2>Brushless Motor Project ⚡</h2>
    <img src="files/motor.jpg">
    <p>Custom BLDC motor + controller design.</p>
    <div class="close" onclick="closePopup()">Close</div>
</div>

<div id="violin" class="popup">
    <h2>Violin Project 🎻</h2>
    <img src="files/fair.jpg">
    <p>Built + presented at science fair.</p>
    <div class="close" onclick="closePopup()">Close</div>
</div>

<div id="scope" class="popup">
    <h2>Oscilloscope (Bad Apple) 📺</h2>
    <video controls src="files/scope.mp4"></video>
    <div class="close" onclick="closePopup()">Close</div>
</div>

<script>
function openPopup(id) {
    document.getElementById(id).classList.add('show');
}

function closePopup() {
    document.querySelectorAll('.popup').forEach(p => p.classList.remove('show'));
}
</script>

</body>
</html>
