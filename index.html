<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow: hidden;
}

/* background lab */
#lab {
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: url("files/lab.jpg") center/cover no-repeat;
}

/* overlay */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* header */
#header {
    position: fixed;
    top: 20px;
    right: 40px;
    display: flex;
    gap: 20px;
    z-index: 2;
}

.resume, .email {
    border: 1px solid white;
    padding: 8px 14px;
    cursor: pointer;
}

.resume:hover, .email:hover {
    background: white;
    color: black;
}

/* title */
#title {
    position: fixed;
    bottom: 40px;
    left: 40px;
    z-index: 2;
}

#title h1 {
    margin: 0;
    font-size: 48px;
}

/* zones */
.zone {
    position: absolute;
    cursor: pointer;
    z-index: 2;
}

.zone:hover {
    outline: 2px solid rgba(255,255,255,0.6);
}

/* modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.95);
    display: none;

    flex-direction: column;
    align-items: center;
    overflow-y: auto;
}

/* modal content */
.modal-content {
    margin-top: 80px;
    width: 90%;
    max-width: 900px;
}

.modal img, .modal video {
    width: 100%;
    margin-bottom: 20px;
}

/* close button */
.close {
    position: fixed;
    top: 20px;
    right: 40px;
    font-size: 28px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="lab"></div>
<div id="overlay"></div>

<!-- header -->
<div id="header">
    <div class="email" onclick="location.href='mailto:j.llamas@berkeley.edu'">
        Email
    </div>

    <div class="resume" onclick="window.open('files/Resume.pdf')">
        Resume
    </div>
</div>

<!-- title -->
<div id="title">
    <h1>Jose Llamas</h1>
    <p>Sophomore @ UC Berkeley EECS</p>
    <p>click the lab to explore</p>
</div>

<!-- zones -->

<div class="zone" style="top:40%; left:30%; width:200px; height:200px;"
     onclick="openModal('bldc')"></div>

<div class="zone" style="top:50%; left:55%; width:200px; height:200px;"
     onclick="openModal('violin')"></div>

<div class="zone" style="top:30%; left:75%; width:200px; height:200px;"
     onclick="openModal('scope')"></div>


<!-- BLDC -->
<div class="modal" id="bldc">
    <div class="close" onclick="closeModal()">✕</div>
    <div class="modal-content">
        <h2>BLDC Motor + Controller</h2>
        <img src="files/bldc_controller.jpg">
        <img src="files/bldc_magnets.jpg">
    </div>
</div>

<!-- VIOLIN -->
<div class="modal" id="violin">
    <div class="close" onclick="closeModal()">✕</div>
    <div class="modal-content">
        <h2>Electric Violin</h2>
        <img src="files/violin_top.jpg">
        <img src="files/violin_side.jpg">
    </div>
</div>

<!-- OSCILLOSCOPE -->
<div class="modal" id="scope">
    <div class="close" onclick="closeModal()">✕</div>
    <div class="modal-content">
        <h2>Oscilloscope</h2>
        <video src="files/oscilloscope.mp4" controls autoplay></video>
    </div>
</div>


<script>
function openModal(id) {
    document.getElementById(id).style.display = "flex";
}

function closeModal() {
    document.querySelectorAll(".modal").forEach(m => m.style.display = "none");
}
</script>

</body>
</html>
