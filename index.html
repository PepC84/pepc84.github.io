<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pep Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    padding: 15px;
    z-index: 100;
}

nav a {
    color: white;
    margin: 0 20px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #00ffff;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
    animation: fadeIn 2s ease;
}

.hero p {
    opacity: 0.7;
    animation: fadeIn 3s ease;
}

/* PROJECTS */
.section {
    padding: 100px 20px;
    text-align: center;
}

.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    transition: 0.4s;
    transform: translateY(50px);
    opacity: 0;
}

.card:hover {
    transform: scale(1.05);
    background: #222;
}

/* SCROLL ANIMATION */
.show {
    transform: translateY(0);
    opacity: 1;
}

/* CONTACT */
.contact {
    padding: 100px 20px;
    text-align: center;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<section class="hero" id="home">
    <h1>Pep</h1>
    <p>EECS • Builder • Lowkey cracked</p>
</section>

<section class="section" id="projects">
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">BLDC Motor Project ⚡</div>
        <div class="card">Custom Linux Setup 🐧</div>
        <div class="card">Game Streaming Server 🎮</div>
        <div class="card">Future Startup Idea 🚀</div>
    </div>
</section>

<section class="contact" id="contact">
    <h2>Contact</h2>
    <p>email: youremail@gmail.com</p>
</section>

<script>
// scroll animation
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;

        if(top < trigger) {
            card.classList.add('show');
        }
    });
});
</script>

</body>
</html>
