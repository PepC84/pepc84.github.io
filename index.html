<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow: hidden;
}

/* ===== TOP UI ===== */

.badge {
    position: fixed;
    top: 20px;
    left: 20px;
    border: 1px solid white;
    padding: 10px 14px;
    z-index: 20;
}

.actions {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 20;
}

button {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 8px 14px;
    cursor: pointer;
}

button:hover {
    background: white;
    color: black;
}

/* ===== IDENTITY ===== */

.identity {
    position: fixed;
    bottom: 30px;
    left: 30px;
    z-index: 20;
}

.identity .name {
    font-size: clamp(24px, 4vw, 48px);
}

.identity .sub {
    font-size: clamp(14px, 2vw, 20px);
    opacity: 0.7;
}

/* ===== HOME ===== */

#home {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: 100vh;
}

.panel {
    position: relative;
    cursor: pointer;
}

.panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5);
    transition: 0.5s;
}

.panel:hover img {
    transform: scale(1.08);
    filter: brightness(0.8);
}

.overlay {
    position: absolute;
    bottom: 30px;
    left: 30px;
}

/* ===== LAB SCENE ===== */

#labScene {
    display: none;
    position: fixed;
    inset: 0;
}

#labScene img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.6);
}

/* MENU INSIDE LAB */

.labMenu {
    position: absolute;
    left: 40px;
    top: 120px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.labMenu button {
    width: 200px;
    text-align: left;
}

/* ===== MODAL ===== */

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    padding: 60px;
    overflow-y: auto;
}

.close {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 24px;
    cursor: pointer;
}

/* PROJECT */

.project {
    display: flex;
    margin-bottom: 40px;
    align-items: center;
}

.project img {
    width: 260px;
    margin-right: 20px;
}

/* GALLERY */

.gallery img {
    width: 200px;
    margin: 10px;
}

/* CONTACT */

.contactModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.contactBox {
    border: 1px solid white;
    padding: 40px;
    text-align: center;
    background: black;
}

</style>
</head>

<body>

<div class="badge">~/pepc84</div>

<div class="actions">
    <a href="files/Resume.pdf" target="_blank">
        <button>Resume</button>
    </a>
    <button onclick="openContact()">Contact</button>
</div>

<div class="identity">
    <div class="name">Jose Llamas</div>
    <div class="sub">Sophomore @ UC Berkeley EECS</div>
</div>

<!-- HOME -->
<div id="home">

    <div class="panel" onclick="openLab()">
        <img src="files/lab.jpg">
        <div class="overlay">EE Lab</div>
    </div>

    <div class="panel" onclick="openPage('ide')">
        <img src="files/ProcessingGL_1.png">
        <div class="overlay">Simple++ IDE</div>
    </div>

    <div class="panel" onclick="openPage('math')">
        <img src="files/bezier_1.png">
        <div class="overlay">Math / Graphics</div>
    </div>

</div>

<!-- LAB SCENE -->
<div id="labScene">
    <img src="files/lab.jpg">

    <div class="labMenu">
        <button onclick="openProject('bldc')">BLDC Motor</button>
        <button onclick="openProject('scope')">Oscilloscope</button>
        <button onclick="openProject('violin')">Violin Project</button>
    </div>

    <div class="close" onclick="closeLab()">X</div>
</div>

<!-- PROJECT MODAL -->
<div id="modal" class="modal">
    <div class="close" onclick="closeModal()">X</div>

    <div id="bldc" class="content">
        <div class="project">
            <img src="files/bldc_controller.jpg">
            <div>Custom BLDC motor + ESC design</div>
        </div>
        <img src="files/bldc_magnets.jpg">
    </div>

    <div id="scope" class="content" style="display:none;">
        <video controls>
            <source src="files/oscilloscope.mp4">
        </video>
    </div>

    <div id="violin" class="content" style="display:none;">
        <img src="files/violin_top.jpg">
        <img src="files/violin_side.jpg">
    </div>

</div>

<!-- IDE PAGE -->
<div id="ide" class="modal">
    <div class="close" onclick="closeModal()">X</div>
    <h2>Simple++ IDE</h2>
    <img src="files/ProcessingGL_1.png" style="width:80%;">
</div>

<!-- MATH PAGE -->
<div id="math" class="modal">
    <div class="close" onclick="closeModal()">X</div>

    <h2>Math + Graphics</h2>

    <img src="files/bezier_1.png">
    <img src="files/stats_1.png">
    <img src="files/stats_2.png">
</div>

<!-- CONTACT -->
<div id="contact" class="contactModal">
    <div class="contactBox">
        <div class="close" onclick="closeContact()">X</div>
        <h2>Jose Llamas</h2>
        <p>j.llamas@berkeley.edu</p>
        <a href="mailto:j.llamas@berkeley.edu">
            <button>Email Me</button>
        </a>
    </div>
</div>

<script>
function openLab() {
    document.getElementById("labScene").style.display = "block";
}

function closeLab() {
    document.getElementById("labScene").style.display = "none";
}

function openProject(name) {
    document.getElementById("modal").style.display = "block";
    document.querySelectorAll(".content").forEach(c => c.style.display="none");
    document.getElementById(name).style.display = "block";
}

function closeModal() {
    document.querySelectorAll(".modal").forEach(m => m.style.display="none");
}

function openPage(id) {
    document.getElementById(id).style.display = "block";
}

function openContact() {
    document.getElementById("contact").style.display = "flex";
}

function closeContact() {
    document.getElementById("contact").style.display = "none";
}
</script>

</body>
</html>
