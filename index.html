<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* HOME SCREEN */

#home {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 40px;
}

.name {
    font-size: 48px;
}

.subtitle {
    font-size: 20px;
    opacity: 0.7;
}

.topbar {
    position: fixed;
    top: 20px;
    right: 30px;
    text-align: right;
}

button {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 10px 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: white;
    color: black;
}

/* LAB PAGE */

#labPage {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
}

#labBackground {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* clickable zones */

.zone {
    position: absolute;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
}

.zone:hover {
    background: rgba(255,255,255,0.1);
}

/* modal */

#modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    padding: 40px;
    overflow-y: auto;
}

#modal img {
    width: 300px;
    margin: 10px;
}

.close {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 24px;
    cursor: pointer;
}

/* projects section */

.project {
    display: flex;
    align-items: center;
    margin-bottom: 40px;
}

.project img {
    width: 250px;
    margin-right: 20px;
}

/* scroll gallery */

.gallery {
    margin-top: 40px;
}

.gallery img {
    width: 200px;
    margin: 10px;
}

</style>
</head>

<body>

<!-- TOP RIGHT -->
<div class="topbar">
    ~/pepc84<br>
    <a href="mailto:j.llamas@berkeley.edu"><button>Email</button></a><br>
    <a href="files/Resume.pdf" target="_blank"><button>Resume</button></a><br>
    <button onclick="openLab()">Check the Lab</button>
</div>

<!-- HOME -->
<div id="home">
    <div class="name">Jose Llamas</div>
    <div class="subtitle">Sophomore @ UC Berkeley EECS</div>
</div>

<!-- LAB PAGE -->
<div id="labPage">
    <img id="labBackground" src="files/lab.jpg">

    <!-- clickable areas -->
    <div class="zone" style="top:40%; left:30%; width:15%; height:20%;" onclick="openProject('motor')"></div>
    <div class="zone" style="top:50%; left:55%; width:15%; height:20%;" onclick="openProject('violin')"></div>
    <div class="zone" style="top:30%; left:75%; width:10%; height:20%;" onclick="openProject('scope')"></div>
</div>

<!-- MODAL -->
<div id="modal">
    <div class="close" onclick="closeModal()">X</div>

    <div id="motor" class="content">
        <div class="project">
            <img src="files/bldc_controller.jpg">
            <div>
                Brushless motor controller built from scratch  
                custom ESC design and hall sensor feedback  
            </div>
        </div>
        <img src="files/bldc_magnets.jpg">
    </div>

    <div id="violin" class="content" style="display:none;">
        <div class="project">
            <img src="files/violin_top.jpg">
            <div>
                Custom violin experiment and acoustic testing  
            </div>
        </div>
        <img src="files/violin_side.jpg">
    </div>

    <div id="scope" class="content" style="display:none;">
        <div class="project">
            <div>
                Oscilloscope rendering Bad Apple waveform  
            </div>
        </div>
        <video width="500" controls>
            <source src="files/oscilloscope.mp4" type="video/mp4">
        </video>
    </div>

    <!-- SCROLLABLE GALLERY -->
    <div class="gallery">
        <h3>More Photos</h3>
        <img src="files/bldc_controller.jpg">
        <img src="files/bldc_magnets.jpg">
        <img src="files/violin_top.jpg">
        <img src="files/violin_side.jpg">
        <img src="files/lab.jpg">
    </div>

</div>

<script>
function openLab() {
    document.getElementById("labPage").style.display = "block";
}

function openProject(name) {
    document.getElementById("modal").style.display = "block";

    document.querySelectorAll(".content").forEach(el => el.style.display = "none");
    document.getElementById(name).style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
