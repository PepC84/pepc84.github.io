<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }

.page { display:none; height:100vh; }
.active { display:block; }

#home { display:flex; }

.section {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    border:2px solid white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="home" class="page active">
    <div class="section" onclick="showPage('lab')">EE</div>
    <div class="section" onclick="showPage('lab')">CS</div>
    <div class="section" onclick="showPage('lab')">Math</div>
</div>

<div id="lab" class="page">
    <h1>LAB PAGE WORKS</h1>
    <button onclick="showPage('home')">Go Back</button>
</div>

<script>
function showPage(id) {
    console.log("clicked", id);

    document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
