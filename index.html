<html lang="en">
<head>

<title>Jose Llamas</title>

<style>

#landing {
    height: 100vh;
    background: url("files/lab.JPG") center/cover no-repeat;

}

.gallery img, .gallery video {
    width: 100%;
    max-width: 600px;
    margin-bottom: 20px;
}
