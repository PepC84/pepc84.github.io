<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    overflow-x: hidden;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 100;
}

nav .left a {
    margin-right: 20px;
    text-decoration: none;
    color: white;
}

nav .right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.terminal {
    color: #00ffff;
    font-family: monospace;
}

.resume-btn {
    padding: 6px 12px;
    border-radius: 6px;
    background: #00ffff;
    color: black;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}

.resume-btn:hover {
    background: #00cccc;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
    animation: fadeIn 1.5s ease;
}

.name {
    margin-top: 10px;
    font-size: 1.5rem;
    opacity: 0.9;
    animation: fadeIn 2s ease;
}

.subtitle {
    margin-top: 5px;
    font-size: 1rem;
    opacity: 0.6;
    animation: fadeIn 2.5s ease;
}

/* PROJECTS */
.section {
    padding: 100px 20px;
    text-align: center;
}

.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    transition: 0.4s;
    transform: translateY(50px);
    opacity: 0;
}

.card:hover {
    transform: scale(1.05);
    background: #222;
}

.show {
    transform: translateY(0);
    opacity: 1;
}

/* CONTACT */
.contact {
    padding: 100px 20px;
    text-align: center;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<nav>
    <div class="left">
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
    <div class="right">
        <div class="terminal">~/pepc84</div>
        <a href="files/Resume.pdf" class="resume-btn" target="_blank">Resume</a>
    </div>
</nav>

<section class="hero" id="home">
    <h1>Pep</h1>
    <div class="name">Jose Llamas</div>
    <div class="subtitle">Sophomore @ UC Berkeley EECS</div>
</section>

<section class="section" id="projects">
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">BLDC Motor Project ⚡</div>
        <div class="card">Custom Linux Setup 🐧</div>
        <div class="card">Game Streaming Server 🎮</div>
        <div class="card">Future Startup Idea 🚀</div>
    </div>
</section>

<section class="contact" id="contact">
    <h2>Contact</h2>
    <p>email: j.llamas@berkeley.com</p>
</section>

<script>
const cards = document.querySelectorAll('.card');

window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;

    cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if(top < trigger) {
            card.classList.add('show');
        }
    });
});
</script>

</body>
</html>
