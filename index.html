<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jose Llamas</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* landing */
#landing {
    height: 100vh;
    background-size: cover;
    background-position: center;
    position: relative;
}

#landing::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* header */
#header {
    position: absolute;
    top: 20px;
    right: 40px;
    display: flex;
    gap: 20px;
    z-index: 2;
}

.resume, .email {
    border: 1px solid white;
    padding: 8px 14px;
    cursor: pointer;
}

.resume:hover, .email:hover {
    background: white;
    color: black;
}

/* title */
#title {
    position: absolute;
    bottom: 40px;
    left: 40px;
    z-index: 2;
}

#title h1 {
    margin: 0;
    font-size: 48px;
}

/* zones */
.zone {
    position: absolute;
    cursor: pointer;
    z-index: 2;
}

.zone:hover {
    outline: 2px solid white;
}

/* sections */
.section {
    padding: 80px 40px;
}

.gallery {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.gallery img, .gallery video {
    width: 100%;
    max-width: 900px;
}

.back {
    margin-top: 40px;
    border: 1px solid white;
    padding: 10px 20px;
    display: inline-block;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="landing">
    <div id="header">
        <div class="email" onclick="location.href='mailto:j.llamas@berkeley.edu'">
            Email
        </div>

        <div class="resume" onclick="window.open('files/Resume.pdf')">
            Resume
        </div>
    </div>

    <div id="title">
        <h1>Jose Llamas</h1>
        <p>Sophomore @ UC Berkeley EECS</p>
    </div>

    <div id="zones"></div>
</div>

<div id="projects"></div>

<script>

/* =========================
   🔧 EDIT ONLY THIS SECTION
========================= */

const projects = [
{
    id: "bldc",
    title: "BLDC Motor + Controller",
    bgZone: { top:"40%", left:"30%", w:"200px", h:"200px" },
    files: [
        "bldc_controller.jpg",
        "bldc_magnets.jpg"
    ]
},
{
    id: "violin",
    title: "Electric Violin",
    bgZone: { top:"50%", left:"55%", w:"200px", h:"200px" },
    files: [
        "violin_top.jpg",
        "violin_side.jpg"
    ]
},
{
    id: "scope",
    title: "Oscilloscope",
    bgZone: { top:"30%", left:"75%", w:"200px", h:"200px" },
    files: [
        "oscilloscope.mp4"
    ]
}
];

// background image
const backgroundImage = "files/lab.jpg";

/* =========================
   ⚙️ DO NOT TOUCH BELOW
========================= */

// set background
document.getElementById("landing").style.backgroundImage = `url(${backgroundImage})`;

// create zones
const zonesContainer = document.getElementById("zones");

projects.forEach(p => {
    const z = document.createElement("div");
    z.className = "zone";
    z.style.top = p.bgZone.top;
    z.style.left = p.bgZone.left;
    z.style.width = p.bgZone.w;
    z.style.height = p.bgZone.h;

    z.onclick = () => {
        document.getElementById(p.id).scrollIntoView({ behavior: "smooth" });
    };

    zonesContainer.appendChild(z);
});

// create sections
const projectContainer = document.getElementById("projects");

projects.forEach(p => {

    const section = document.createElement("div");
    section.className = "section";
    section.id = p.id;

    let html = `<h2>${p.title}</h2><div class="gallery">`;

    p.files.forEach(file => {
        if (file.toLowerCase().endsWith(".mp4")) {
            html += `<video src="files/${file}" controls></video>`;
        } else {
            html += `<img src="files/${file}">`;
        }
    });

    html += `</div>
    <div class="back" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        Back to Lab
    </div>`;

    section.innerHTML = html;
    projectContainer.appendChild(section);
});

</script>

</body>
</html>
